<!doctype html>
<html lang="hr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>FENIX S V1.0</title>
  <style>
    :root{
      --bg:#07111f;--panel:#0f1b2d;--panel2:#12233a;--text:#f8fafc;
      --muted:#94a3b8;--accent:#f59e0b;--green:#22c55e;--yellow:#facc15;
      --red:#ef4444;--line:#28415f;--blue:#38bdf8;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
    header{position:sticky;top:0;background:#020617;padding:14px;border-bottom:1px solid var(--line);z-index:5}
    h1{margin:0;font-size:22px;color:var(--accent)}
    .sub{color:var(--muted);font-size:13px;margin-top:4px}
    main{padding:14px;max-width:820px;margin:auto}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px;margin:12px 0}
    .card h2{margin:0 0 10px;font-size:18px}
    label{display:block;margin-top:10px;color:var(--muted);font-size:14px}
    input,select,textarea,button{
      width:100%;padding:12px;margin-top:6px;border-radius:12px;border:1px solid var(--line);
      background:#071827;color:var(--text);font-size:16px
    }
    textarea{min-height:80px}
    button{background:var(--accent);color:#111827;font-weight:bold;border:none;margin-top:14px}
    .btn2{background:var(--blue);color:#04131f}
    .btn3{background:var(--green);color:#04130a}
    .smallbtn{width:auto;padding:8px 12px;font-size:14px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .hidden{display:none}
    .pill{display:inline-block;padding:6px 10px;border-radius:999px;background:var(--panel2);border:1px solid var(--line);margin:4px 4px 0 0}
    .ok{color:var(--green)} .warn{color:var(--yellow)} .bad{color:var(--red)}
    .score{font-size:32px;font-weight:bold;color:var(--accent)}
    .muted{color:var(--muted)}
    footer{padding:20px;text-align:center;color:var(--muted);font-size:12px}
  </style>
</head>

<body>
<header>
  <h1>🦅 FENIX S V1.0</h1>
  <div class="sub" id="topLine">Osobni dnevnik energije, oporavka i napretka</div>
</header>

<main>

  <section class="card" id="setupCard">
    <h2>⚙️ Prvi setup</h2>

    <label>Ime</label>
    <input id="name" placeholder="npr. Siniša">

    <label>Datum rođenja</label>
    <input id="birth" type="date">

    <label>Spol</label>
    <select id="sex">
      <option value="">Odaberi</option>
      <option>Muško</option>
      <option>Žensko</option>
      <option>Ne želim navesti</option>
    </select>

    <div class="grid">
      <div>
        <label>Visina cm</label>
        <input id="height" type="number" placeholder="180">
      </div>
      <div>
        <label>Težina kg</label>
        <input id="weight" type="number" placeholder="85">
      </div>
    </div>

    <label>Cilj korištenja</label>
    <select id="goal">
      <option>Oporavak nakon bolesti</option>
      <option>Više energije</option>
      <option>Bolji san</option>
      <option>Kondicija</option>
      <option>Opće zdravlje</option>
      <option>Drugo</option>
    </select>

    <label>Koristiš li smartwatch?</label>
    <select id="smartwatch">
      <option>Da</option>
      <option>Ne</option>
    </select>

    <label>Vremenska zona</label>
    <input id="timezone">

    <div class="grid">
      <div>
        <label>Vrijeme buđenja</label>
        <input id="wakeTime" type="time" value="06:30">
      </div>
      <div>
        <label>Vrijeme spavanja</label>
        <input id="sleepTime" type="time" value="22:00">
      </div>
    </div>

    <label>Važna napomena za FENIX S</label>
    <textarea id="noteSetup" placeholder="npr. oporavljam se nakon bolesti..."></textarea>

    <button onclick="saveSetup()">Spremi setup</button>
  </section>

  <section class="card hidden" id="dashboard">
    <h2 id="hello">Dobrodošao</h2>
    <div class="muted" id="todayInfo"></div>

    <div id="yesterdayBox" class="card hidden" style="background:#0b1f33">
      <h2>🌞 Jučerašnji sažetak</h2>
      <div id="yesterdayText"></div>
    </div>

    <div class="pill">Status dana: <b id="dayStatus">Novi dan</b></div>
  </section>

  <section class="card hidden" id="morningCard">
    <h2>🌅 Jutarnji unos</h2>

    <div class="grid">
      <div><label>Body Battery sada</label><input id="bbNow" type="number" min="0" max="100"></div>
      <div><label>BB punjenje noću</label><input id="bbCharge" type="number"></div>
      <div><label>San - ocjena 1-10</label><input id="sleepScore" type="number" min="1" max="10"></div>
      <div><label>Stres 0-100</label><input id="stress" type="number" min="0" max="100"></div>
      <div><label>Energija 1-10</label><input id="energy" type="number" min="1" max="10"></div>
      <div><label>Temperatura °C</label><input id="temp" type="number" step="0.1"></div>
    </div>

    <label>Jutarnja bilješka</label>
    <textarea id="morningNote"></textarea>

    <button onclick="saveMorning()">💾 Spremi jutro</button>

    <div id="morningResult" class="card hidden" style="background:#0b1f33"></div>
  </section>

  <section class="card hidden" id="eveningCard">
    <h2>🌙 Večernji unos</h2>

    <div class="grid">
      <div><label>Voda danas L</label><input id="water" type="number" step="0.1"></div>
      <div><label>Aktivnost 1-10</label><input id="activity" type="number" min="1" max="10"></div>
      <div><label>Ocjena dana 1-10</label><input id="dayRating" type="number" min="1" max="10"></div>
      <div>
        <label>Bolovi danas?</label>
        <select id="painExist" onchange="togglePain()">
          <option>Ne</option>
          <option>Da</option>
        </select>
      </div>
    </div>

    <div id="painBox" class="hidden">
      <div class="grid">
        <div><label>Glava 1-10</label><input id="painHead" type="number" min="0" max="10" value="0"></div>
        <div><label>Ruka 1-10</label><input id="painArm" type="number" min="0" max="10" value="0"></div>
        <div><label>Noga 1-10</label><input id="painLeg" type="number" min="0" max="10" value="0"></div>
        <div><label>Tijelo 1-10</label><input id="painBody" type="number" min="0" max="10" value="0"></div>
      </div>
    </div>

    <label>Večernja bilješka</label>
    <textarea id="eveningNote"></textarea>

    <button class="btn3" onclick="closeDay()">✅ Zatvori dan</button>
  </section>

  <section class="card hidden" id="reviewCard">
    <h2>🌙 Večernji osvrt</h2>
    <div id="reviewText"></div>
  </section>

  <section class="card hidden" id="dataCard">
    <h2>📦 Podaci</h2>
    <button class="btn2" onclick="exportData()">Izvoz podataka JSON</button>
    <button class="smallbtn" onclick="resetApp()">Reset aplikacije</button>
    <pre id="exportBox" style="white-space:pre-wrap;color:var(--muted)"></pre>
  </section>

</main>

<footer>
  FENIX S V1.0 – pozitivno, jasno, s brojem i preporukom.
</footer>

<script>
const LS_SETUP = "fenix_setup_v10";
const LS_DAYS = "fenix_days_v10";

function todayKey(){
  const d = new Date();
  return d.toISOString().slice(0,10);
}

function yesterdayKey(){
  const d = new Date();
  d.setDate(d.getDate()-1);
  return d.toISOString().slice(0,10);
}

function getDays(){
  return JSON.parse(localStorage.getItem(LS_DAYS) || "{}");
}

function setDays(days){
  localStorage.setItem(LS_DAYS, JSON.stringify(days));
}

function init(){
  document.getElementById("timezone").value =
    Intl.DateTimeFormat().resolvedOptions().timeZone || "Europe/Zagreb";

  const setup = JSON.parse(localStorage.getItem(LS_SETUP) || "null");

  if(setup){
    document.getElementById("setupCard").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
    document.getElementById("morningCard").classList.remove("hidden");
    document.getElementById("eveningCard").classList.remove("hidden");
    document.getElementById("dataCard").classList.remove("hidden");

    document.getElementById("hello").innerText =
      `Dobro došao, ${setup.name || "prijatelju"} 🦅`;

    document.getElementById("todayInfo").innerText =
      `Danas je ${todayKey()} | Zona: ${setup.timezone}`;

    loadToday();
    showYesterday();
  }
}

function saveSetup(){
  const setup = {
    name: val("name"),
    birth: val("birth"),
    sex: val("sex"),
    height: num("height"),
    weight: num("weight"),
    goal: val("goal"),
    smartwatch: val("smartwatch"),
    timezone: val("timezone"),
    wakeTime: val("wakeTime"),
    sleepTime: val("sleepTime"),
    note: val("noteSetup"),
    createdAt: new Date().toISOString()
  };
  localStorage.setItem(LS_SETUP, JSON.stringify(setup));
  location.reload();
}

function val(id){ return document.getElementById(id).value; }
function num(id){ return Number(document.getElementById(id).value || 0); }

function calculateMorningIndex(d){
  let score = 50;
  score += (d.bbNow || 0) * 0.25;
  score += (d.bbCharge || 0) * 0.10;
  score += (d.sleepScore || 0) * 3;
  score += (d.energy || 0) * 3;
  score -= (d.stress || 0) * 0.20;
  return Math.max(0, Math.min(100, Math.round(score)));
}

function labelScore(score){
  if(score >= 85) return "Izvrstan";
  if(score >= 70) return "Vrlo dobar";
  if(score >= 55) return "Dobar";
  if(score >= 40) return "Za oprez";
  return "Tijelo traži više odmora";
}

function saveMorning(){
  const days = getDays();
  const key = todayKey();

  const day = days[key] || {};
  day.date = key;
  day.status = "Otvoren";
  day.morning = {
    bbNow: num("bbNow"),
    bbCharge: num("bbCharge"),
    sleepScore: num("sleepScore"),
    stress: num("stress"),
    energy: num("energy"),
    temp: num("temp"),
    note: val("morningNote"),
    savedAt: new Date().toISOString()
  };

  day.morningIndex = calculateMorningIndex(day.morning);
  days[key] = day;
  setDays(days);

  document.getElementById("dayStatus").innerText = "Otvoren";
  document.getElementById("morningResult").classList.remove("hidden");
  document.getElementById("morningResult").innerHTML = `
    <div class="score">${day.morningIndex}/100</div>
    <b>${labelScore(day.morningIndex)}</b>
    <p class="muted">Jutro je spremljeno. Dan je otvoren.</p>
  `;
}

function togglePain(){
  const show = val("painExist") === "Da";
  document.getElementById("painBox").classList.toggle("hidden", !show);
}

function closeDay(){
  const days = getDays();
  const key = todayKey();
  const day = days[key] || {date:key};

  day.status = "Zatvoren";
  day.evening = {
    water: num("water"),
    activity: num("activity"),
    dayRating: num("dayRating"),
    painExist: val("painExist"),
    painHead: num("painHead"),
    painArm: num("painArm"),
    painLeg: num("painLeg"),
    painBody: num("painBody"),
    note: val("eveningNote"),
    savedAt: new Date().toISOString()
  };

  day.dayResult = calculateDayResult(day);
  days[key] = day;
  setDays(days);

  document.getElementById("dayStatus").innerText = "Zatvoren";
  showReview(day);
}

function calculateDayResult(day){
  let score = day.morningIndex || 50;
  const e = day.evening || {};

  score += (e.dayRating || 0) * 3;
  score += (e.activity || 0) * 1.5;

  const water = e.water || 0;
  if(water >= 2) score += 8;
  else if(water >= 1.5) score += 4;
  else score -= 6;

  const painAvg = ((e.painHead||0)+(e.painArm||0)+(e.painLeg||0)+(e.painBody||0))/4;
  score -= painAvg * 3;

  return Math.max(0, Math.min(100, Math.round(score)));
}

function showReview(day){
  const diff = (day.dayResult || 0) - (day.morningIndex || 0);
  const sign = diff >= 0 ? "+" : "";

  document.getElementById("reviewCard").classList.remove("hidden");
  document.getElementById("reviewText").innerHTML = `
    <div class="pill">Jutarnji indeks: <b>${day.morningIndex || 0}/100</b></div>
    <div class="pill">Rezultat dana: <b>${day.dayResult || 0}/100</b></div>
    <div class="pill">Promjena: <b>${sign}${diff}</b></div>

    <p><b>${labelScore(day.dayResult || 0)}</b></p>

    <p>Dobro je što si zatvorio dan. Time FENIX S dobiva podatke iz kojih ćemo kasnije moći tražiti obrasce umora, oporavka, boli i energije.</p>

    <p><b>Preporuka za sutra:</b><br>
    Zadrži jutarnji unos kratak, popij vodu ranije tijekom dana i obrati pažnju na tijelo ako se bolovi pojačaju.</p>

    <p class="muted">“Male stvari, učinjene dosljedno, stvaraju velike promjene.”</p>
  `;
}

function showYesterday(){
  const days = getDays();
  const y = days[yesterdayKey()];
  if(!y) return;

  document.getElementById("yesterdayBox").classList.remove("hidden");
  document.getElementById("yesterdayText").innerHTML = `
    🦅 Jutarnji indeks: <b>${y.morningIndex || 0}/100</b><br>
    🌅 Rezultat dana: <b>${y.dayResult || 0}/100</b><br>
    💧 Voda: <b>${y.evening?.water || 0} L</b><br>
    ⭐ Ocjena dana: <b>${y.evening?.dayRating || 0}/10</b><br>
    😣 Bolovi: glava ${y.evening?.painHead || 0}, ruka ${y.evening?.painArm || 0}, noga ${y.evening?.painLeg || 0}, tijelo ${y.evening?.painBody || 0}
  `;
}

function loadToday(){
  const days = getDays();
  const d = days[todayKey()];
  if(!d) return;

  document.getElementById("dayStatus").innerText = d.status || "Otvoren";

  if(d.morning){
    document.getElementById("bbNow").value = d.morning.bbNow || "";
    document.getElementById("bbCharge").value = d.morning.bbCharge || "";
    document.getElementById("sleepScore").value = d.morning.sleepScore || "";
    document.getElementById("stress").value = d.morning.stress || "";
    document.getElementById("energy").value = d.morning.energy || "";
    document.getElementById("temp").value = d.morning.temp || "";
    document.getElementById("morningNote").value = d.morning.note || "";
  }

  if(d.evening){
    document.getElementById("water").value = d.evening.water || "";
    document.getElementById("activity").value = d.evening.activity || "";
    document.getElementById("dayRating").value = d.evening.dayRating || "";
    document.getElementById("painExist").value = d.evening.painExist || "Ne";
    togglePain();
    document.getElementById("painHead").value = d.evening.painHead || 0;
    document.getElementById("painArm").value = d.evening.painArm || 0;
    document.getElementById("painLeg").value = d.evening.painLeg || 0;
    document.getElementById("painBody").value = d.evening.painBody || 0;
    document.getElementById("eveningNote").value = d.evening.note || "";
  }
}

function exportData(){
  const data = {
    setup: JSON.parse(localStorage.getItem(LS_SETUP) || "{}"),
    days: getDays()
  };
  document.getElementById("exportBox").innerText = JSON.stringify(data,null,2);
}

function resetApp(){
  if(confirm("Sigurno želiš obrisati FENIX S podatke na ovom uređaju?")){
    localStorage.removeItem(LS_SETUP);
    localStorage.removeItem(LS_DAYS);
    location.reload();
  }        
}

init();
</script>

</body>
</html>
