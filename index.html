<!doctype html>
<html lang="hr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FENIX S App V1.3.0</title>
  <style>
    :root{
      --bg:#07111f;--panel:#0f1b2d;--panel2:#12243b;--text:#f8fafc;
      --muted:#ffffff;--garmin:#38bdf8;--garmin-bg:#0b2940;--accent:#f59e0b;--green:#22c55e;--yellow:#facc15;
      --red:#ef4444;--line:#28415f;--input:#081827;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);line-height:1.35}
    header{position:sticky;top:0;z-index:10;background:#020617;border-bottom:1px solid var(--line);padding:12px 14px}
    h1{font-size:20px;margin:0;color:var(--accent)}
    .subtitle{font-size:12px;color:var(--text);margin-top:3px}
    main{padding:14px;max-width:860px;margin:0 auto 94px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:14px;box-shadow:0 8px 22px rgba(0,0,0,.22)}
    .card h2{font-size:18px;margin:0 0 12px;color:#fff}
    .card h3{font-size:15px;margin:12px 0 8px;color:#fff}
    .row{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:10px}
    @media(min-width:720px){.row.two{grid-template-columns:1fr 1fr}.row.three{grid-template-columns:1fr 1fr 1fr}}
    label{display:block;font-size:13px;color:var(--text);margin-bottom:5px}
    input,select,textarea{width:100%;background:var(--input);color:var(--text);border:1px solid var(--line);border-radius:12px;padding:10px;font-size:15px;outline:none}
    input[type="date"]{color-scheme:dark}
    textarea{min-height:72px;resize:vertical}
    button{border:0;border-radius:12px;padding:11px 13px;font-size:15px;font-weight:700;cursor:pointer;color:#07111f;background:var(--accent)}
    button.secondary{background:var(--panel2);color:var(--text);border:1px solid var(--line)}
    button.success{background:var(--green);color:#052e16}
    button:disabled{opacity:.78;cursor:not-allowed}
    .buttons{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
    .status{border-left:4px solid var(--accent);padding:10px;background:#0b1f34;border-radius:12px;margin-top:8px}
    .ok{border-left-color:var(--green)}
    .warn{border-left-color:var(--yellow)}

    .garmin-field{background:var(--garmin-bg);border:1px solid var(--garmin)}
    .garmin-label{color:var(--garmin);font-weight:700}
    .garmin-badge{display:inline-block;margin-left:6px;padding:2px 6px;border-radius:999px;background:var(--garmin-bg);border:1px solid var(--garmin);color:var(--garmin);font-size:11px;font-weight:700}
    .hidden{display:none!important}
    .muted{color:var(--text)}
    .small{font-size:13px}
    .kv{display:grid;grid-template-columns:1fr auto;gap:8px;border-bottom:1px solid rgba(255,255,255,.22);padding:7px 0;font-size:14px}
    .kv:last-child{border-bottom:0}
    .datebar{display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:end}
    .datebar button{padding:10px 12px}
    .modebar{position:fixed;left:0;right:0;bottom:0;background:#020617;border-top:1px solid var(--line);padding:10px 14px calc(10px + env(safe-area-inset-bottom));display:flex;gap:10px;justify-content:center;z-index:20}
    .modebar button{max-width:320px;width:50%;white-space:nowrap;font-size:14px}
    .modebar button.active{background:var(--accent);color:#07111f;border-color:var(--accent)}
    .sectionTitle{display:flex;justify-content:space-between;align-items:center;gap:10px}
    .sectionTitle h2{margin:0}
    .tag{font-size:13px;font-weight:700;border-radius:999px;padding:6px 9px;background:var(--panel2);color:var(--text);border:1px solid var(--line);white-space:nowrap}
    .tag.done{background:rgba(34,197,94,.17);color:#86efac;border-color:rgba(34,197,94,.45)}
  </style>
</head>
<body>
<header>
  <h1>FENIX S App V1.3.0</h1>
  <div class="subtitle" id="headerDate">Danas</div>
</header>

<main>
  <section class="card">
    <div class="datebar">
      <button class="secondary" id="prevDayBtn" aria-label="Prethodni dan">‹</button>
      <div>
        <label for="recordDate">Datum zapisa</label>
        <input id="recordDate" type="date" />
      </div>
      <button class="secondary" id="todayBtn">Danas</button>
    </div>
  </section>

  <section class="card" id="morningSection">
    <div class="sectionTitle">
      <h2>Jutro</h2>
      <span class="tag" id="morningTag">otvoreno</span>
    </div>

    <div id="morningFormWrap">
      <div class="row three">
        <div><label for="mEnergy">Kako se osjećaš (1–10)</label><input id="mEnergy" type="number" min="1" max="10" /></div>
        <div><label class="garmin-label" for="mSleep">Kvaliteta sna (0–100)<span class="garmin-badge">Garmin</span></label><input class="garmin-field" id="mSleep" type="number" min="0" max="100" /></div>
        <div><label class="garmin-label" for="mBodyBattery">Body Battery (0–100)<span class="garmin-badge">Garmin</span></label><input class="garmin-field" id="mBodyBattery" type="number" min="0" max="100" /></div>
      </div>
      <div class="row three">
        <div><label for="mCramps">Grčevi noću</label><select id="mCramps"><option value="">odaberi</option><option value="nema">nema</option><option value="blagi">blagi</option><option value="srednji">srednji</option><option value="jaki">jaki</option></select></div>
        <div><label for="mPain">Bol</label><select id="mPain"><option value="">odaberi</option><option value="nema">nema</option><option value="blaga">blaga</option><option value="srednja">srednja</option><option value="jaka">jaka</option></select></div>
      </div>
      <div class="row two">
        <div><label for="mMood">Jutarnji osjećaj</label><select id="mMood"><option value="">odaberi</option><option value="mirno">mirno</option><option value="umorno">umorno</option><option value="nestabilno">nestabilno</option><option value="dobro">dobro</option></select></div>
      </div>
      <div><label for="mNote">Napomena</label><textarea id="mNote" placeholder="Napomena..."></textarea></div>
      <div class="buttons"><button id="saveMorningBtn">Spremi jutro</button><button class="secondary" id="resetMorningBtn">Poništi</button></div>
    </div>

    <div id="morningSavedWrap" class="hidden"><div class="buttons"><button class="secondary" id="editMorningBtn">Uredi jutro</button></div></div>
    <div id="morningCommentWrap" class="hidden"><h3>Komentar</h3><div id="morningComment" class="status ok"></div></div>
    <div id="yesterdayWrap" class="hidden"><h3>Jučer</h3><div id="yesterdaySummary" class="status"></div></div>
  </section>

  <section class="card hidden" id="eveningSection">
    <div class="sectionTitle">
      <h2>Večer</h2>
      <span class="tag" id="eveningTag">otvorena</span>
    </div>

    <div id="eveningFormWrap">
      <div class="row three">
        <div><label for="eEnergy">Kako se osjećaš (1–10)</label><input id="eEnergy" type="number" min="1" max="10" /></div>
        <div><label for="eStress">Stres (0–100)</label><input id="eStress" type="number" min="0" max="100" /></div>
        <div><label for="eActivity">Aktivnost</label><select id="eActivity"><option value="">odaberi</option><option value="niska">niska</option><option value="umjerena">umjerena</option><option value="visoka">visoka</option><option value="previsoka">previsoka</option></select></div>
      </div>
      <div class="row three">
        <div><label for="eCramps">Grčevi</label><select id="eCramps"><option value="">odaberi</option><option value="nema">nema</option><option value="blagi">blagi</option><option value="srednji">srednji</option><option value="jaki">jaki</option></select></div>
        <div><label for="ePain">Bol</label><select id="ePain"><option value="">odaberi</option><option value="nema">nema</option><option value="blaga">blaga</option><option value="srednja">srednja</option><option value="jaka">jaka</option></select></div>
        <div><label for="eWater">Voda danas (L)</label><input id="eWater" type="number" step="0.1" min="0" /></div>
      </div>
      <div class="row two">
        <div><label for="eMood">Kako je prošao dan</label><select id="eMood"><option value="">odaberi</option><option value="mirno">mirno</option><option value="dobro">dobro</option><option value="umorno">umorno</option><option value="preopterećeno">preopterećeno</option></select></div>
        <div><label for="eSleepPlan">San večeras</label><select id="eSleepPlan"><option value="">odaberi</option><option value="standardno">standardno</option><option value="ranije_spavanje">ranije spavanje</option><option value="mirnija_vecer">mirnija večer</option></select></div>
      </div>
      <div><label for="eNote">Napomena</label><textarea id="eNote" placeholder="Napomena..."></textarea></div>
      <div class="buttons"><button id="saveEveningBtn">Spremi večer</button><button class="secondary" id="resetEveningBtn">Poništi</button></div>
    </div>

    <div id="eveningSavedWrap" class="hidden"><div class="buttons"><button class="secondary" id="editEveningBtn">Uredi večer</button></div></div>
    <div id="eveningCommentWrap" class="hidden"><h3>Komentar</h3><div id="eveningComment" class="status ok"></div></div>
    <div id="todaySummaryWrap" class="hidden"><h3>Sažetak</h3><div id="todaySummary" class="status ok"></div></div>
  </section>

  <section class="card">
    <h2>Podaci</h2>
    <div id="dataPreview" class="muted small">Nema podataka.</div>
    <div class="buttons"><button class="secondary" id="exportBtn">Izvoz</button><button class="secondary" id="clearBtn">Obriši sve</button></div>
  </section>
</main>

<div class="modebar">
  <button id="morningModeBtn" class="secondary">Jutro – otvoreno</button>
  <button id="eveningModeBtn" class="secondary">Večer – otvorena</button>
</div>

<script>
(function(){
  const APP_VERSION='1.3.0';
  const STORAGE_KEY='fenix_s_records_v1_2_2';
  const SETTINGS_KEY='fenix_s_settings_v1_2_3';
  const $=id=>document.getElementById(id);
  const pad=n=>String(n).padStart(2,'0');
  const dateKey=(d=new Date())=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const displayDate=key=>{const [y,m,d]=key.split('-');return `${d}.${m}.${y}.`;};
  const todayKey=()=>dateKey(new Date());
  const previousDay=key=>{const d=new Date(key+'T12:00:00');d.setDate(d.getDate()-1);return dateKey(d);};
  const loadRecords=()=>{try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{};}catch{return {};}};
  const saveRecords=r=>localStorage.setItem(STORAGE_KEY,JSON.stringify(r));
  const loadSettings=()=>{try{return JSON.parse(localStorage.getItem(SETTINGS_KEY))||{};}catch{return {};}};
  const saveSettings=s=>localStorage.setItem(SETTINGS_KEY,JSON.stringify(s));

  let selectedDate=todayKey();
  let mode='morning';
  let manualDateSelection=false;

  const defaults={
    morning:{mEnergy:'',mSleep:'',mBodyBattery:'',mCramps:'',mPain:'',mMood:'',mNote:''},
    evening:{eEnergy:'',eStress:'',eActivity:'',eCramps:'',ePain:'',eWater:'',eMood:'',eSleepPlan:'',eNote:''}
  };
  const requiredMorning=['mEnergy','mSleep','mBodyBattery','mCramps','mPain','mMood'];
  const requiredEvening=['eEnergy','eStress','eActivity','eCramps','ePain','eWater','eMood','eSleepPlan'];

  function setFormValues(values){Object.entries(values).forEach(([id,v])=>{if($(id))$(id).value=v??'';});}
  function getFormValues(ids){const o={};ids.forEach(id=>o[id]=$(id).value);return o;}
  function resetMorningForm(){setFormValues(defaults.morning);}
  function resetEveningForm(){setFormValues(defaults.evening);}
  function validate(data,ids,label){if(ids.some(id=>data[id]==='')){alert(label+': unesite sva ključna polja.');return false;}return true;}

  function buildMorningComment(m){
    const p=[],energy=Number(m.mEnergy),sleep=Number(m.mSleep),bb=Number(m.mBodyBattery);
    if(energy<=3||bb<30)p.push('Kreni sporije i čuvaj prvi dio dana.');
    else if(energy>=7&&bb>=60)p.push('Jutro izgleda stabilno; iskoristi energiju bez forsiranja.');
    else p.push('Jutro je za umjeren ritam i realan plan.');
    if(sleep<50)p.push('San je bio slabiji, pa danas smanji nepotreban pritisak.');
    if(m.mCramps&&m.mCramps!=='nema')p.push(`Noćni grčevi: ${m.mCramps}.`);
    if(m.mPain&&m.mPain!=='nema')p.push(m.mPain==='blaga'?'Zabilježena je blaga bol; ostani u mirnijem tempu.':`Bol je ${m.mPain}; nemoj forsirati.`);
    return p.join(' ');
  }

  function buildEveningComment(e){
    const p=[],energy=Number(e.eEnergy),stress=Number(e.eStress),water=Number(e.eWater);
    if(e.eMood==='preopterećeno'||e.eActivity==='previsoka')p.push('Dan je bio zahtjevan; večer zatvori mirno.');
    else if(energy>=6&&stress<50)p.push('Dan je zatvoren stabilno.');
    else p.push('Dan je zatvoren; sada je najvažnije smirivanje ritma.');
    if(e.eCramps&&e.eCramps!=='nema')p.push(`Grčevi: ${e.eCramps}.`);
    if(e.ePain&&e.ePain!=='nema')p.push(e.ePain==='blaga'?'Zabilježena je blaga bol; večeras bez forsiranja.':`Bol je ${e.ePain}; smanji opterećenje.`);
    if(water<1.5)p.push('Voda je danas bila niža; sutra kreni ranije s ravnomjernim unosom.');
    if(e.eSleepPlan==='ranije_spavanje')p.push('Ranije spavanje je dobar izbor za oporavak.');
    if(e.eSleepPlan==='mirnija_vecer')p.push('Mirnija večer može pomoći prijelazu u san.');
    return p.join(' ');
  }

  function setMode(nextMode){
    mode=nextMode;
    $('morningSection').classList.toggle('hidden',mode!=='morning');
    $('eveningSection').classList.toggle('hidden',mode!=='evening');
    $('morningModeBtn').classList.toggle('active',mode==='morning');
    $('eveningModeBtn').classList.toggle('active',mode==='evening');
    const s=loadSettings();s.mode=mode;saveSettings(s);
  }

  function updateDateHeader(){
    const isToday=selectedDate===todayKey();
    $('headerDate').textContent=`${isToday?'Danas':'Odabrano'}: ${displayDate(selectedDate)} · V${APP_VERSION}`;
    $('recordDate').value=selectedDate;
    $('recordDate').max=todayKey();
  }

  function updateModeLabels(record){
    const morningDone=!!record.morning, eveningDone=!!record.evening;
    $('morningModeBtn').textContent=`Jutro – ${morningDone?'uneseno':'otvoreno'}`;
    $('eveningModeBtn').textContent=`Večer – ${eveningDone?'unesena':'otvorena'}`;
    $('morningTag').textContent=morningDone?'uneseno':'otvoreno';
    $('eveningTag').textContent=eveningDone?'unesena':'otvorena';
    $('morningTag').classList.toggle('done',morningDone);
    $('eveningTag').classList.toggle('done',eveningDone);
  }

  function refreshUI(){
    updateDateHeader();
    const records=loadRecords(),record=records[selectedDate]||{};
    updateModeLabels(record);

    if(record.morning){
      $('morningFormWrap').classList.add('hidden');
      $('morningSavedWrap').classList.remove('hidden');
      $('morningCommentWrap').classList.remove('hidden');
      $('morningComment').textContent=record.morningComment||buildMorningComment(record.morning);
    }else{
      $('morningFormWrap').classList.remove('hidden');
      $('morningSavedWrap').classList.add('hidden');
      $('morningCommentWrap').classList.add('hidden');
      resetMorningForm();
    }

    if(record.evening){
      $('eveningFormWrap').classList.add('hidden');
      $('eveningSavedWrap').classList.remove('hidden');
      $('eveningCommentWrap').classList.remove('hidden');
      $('todaySummaryWrap').classList.remove('hidden');
      $('eveningComment').textContent=record.eveningComment||buildEveningComment(record.evening);
    }else{
      $('eveningFormWrap').classList.remove('hidden');
      $('eveningSavedWrap').classList.add('hidden');
      $('eveningCommentWrap').classList.add('hidden');
      $('todaySummaryWrap').classList.add('hidden');
      resetEveningForm();
    }

    const y=records[previousDay(selectedDate)];
    if(mode==='morning'&&selectedDate===todayKey()){
      $('yesterdayWrap').classList.remove('hidden');
      if(!y){$('yesterdaySummary').textContent='Za jučer nema spremljenih podataka.';}
      else{
        const parts=[];
        if(y.morning)parts.push(`Jutro: osjećaj ${y.morning.mEnergy}/10, san ${y.morning.mSleep}/100, BB ${y.morning.mBodyBattery}.`);
        if(y.evening)parts.push(`Večer: osjećaj ${y.evening.eEnergy}/10, stres ${y.evening.eStress}, voda ${y.evening.eWater} L.`);
        $('yesterdaySummary').textContent=parts.join(' ')||'Jučerašnji zapis nije potpun.';
      }
    }else $('yesterdayWrap').classList.add('hidden');

    if(record.evening){
      const parts=[];
      if(record.morning)parts.push(`Jutro: osjećaj ${record.morning.mEnergy}/10, san ${record.morning.mSleep}/100, BB ${record.morning.mBodyBattery}.`);
      parts.push(`Večer: osjećaj ${record.evening.eEnergy}/10, stres ${record.evening.eStress}, aktivnost ${record.evening.eActivity}, voda ${record.evening.eWater} L.`);
      $('todaySummary').textContent=parts.join(' ');
    }
    refreshPreview();
  }

  function saveMorning(){
    const records=loadRecords(),data=getFormValues(Object.keys(defaults.morning));
    if(!validate(data,requiredMorning,'Jutarnji unos'))return;
    if(!records[selectedDate])records[selectedDate]={};
    records[selectedDate].morning=data;
    records[selectedDate].morningComment=buildMorningComment(data);
    records[selectedDate].updatedAt=new Date().toISOString();
    saveRecords(records);resetMorningForm();refreshUI();
  }

  function saveEvening(){
    const records=loadRecords(),data=getFormValues(Object.keys(defaults.evening));
    if(!validate(data,requiredEvening,'Večernji unos'))return;
    if(!records[selectedDate])records[selectedDate]={};
    records[selectedDate].evening=data;
    records[selectedDate].eveningComment=buildEveningComment(data);
    records[selectedDate].updatedAt=new Date().toISOString();
    saveRecords(records);resetEveningForm();refreshUI();
  }

  function editMorning(){const r=loadRecords()[selectedDate];if(r?.morning)setFormValues(r.morning);$('morningFormWrap').classList.remove('hidden');$('morningSavedWrap').classList.add('hidden');}
  function editEvening(){const r=loadRecords()[selectedDate];if(r?.evening)setFormValues(r.evening);$('eveningFormWrap').classList.remove('hidden');$('eveningSavedWrap').classList.add('hidden');}

  function refreshPreview(){
    const records=loadRecords(),keys=Object.keys(records).sort().reverse(),box=$('dataPreview');
    if(!keys.length){box.textContent='Nema podataka.';return;}
    box.innerHTML=keys.slice(0,7).map(k=>`<div class="kv"><span>${displayDate(k)}</span><strong>${records[k].morning?'jutro ✓':'jutro –'} · ${records[k].evening?'večer ✓':'večer –'}</strong></div>`).join('');
  }

  function chooseDate(key,manual=true){
    if(key>todayKey())key=todayKey();
    selectedDate=key;manualDateSelection=manual;refreshUI();
  }

  function checkNewDay(){
    const current=todayKey();
    $('recordDate').max=current;
    if(!manualDateSelection&&selectedDate!==current){selectedDate=current;setMode('morning');refreshUI();}
  }

  function exportJson(){const data=JSON.stringify(loadRecords(),null,2),blob=new Blob([data],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=`fenix-s-export-${todayKey()}.json`;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);}
  function clearAll(){if(confirm('Obrisati sve spremljene FENIX S podatke iz ovog preglednika?')){localStorage.removeItem(STORAGE_KEY);refreshUI();}}

  $('recordDate').addEventListener('change',e=>chooseDate(e.target.value,true));
  $('prevDayBtn').addEventListener('click',()=>chooseDate(previousDay(selectedDate),true));
  $('todayBtn').addEventListener('click',()=>chooseDate(todayKey(),false));
  $('morningModeBtn').addEventListener('click',()=>{setMode('morning');refreshUI();});
  $('eveningModeBtn').addEventListener('click',()=>{setMode('evening');refreshUI();});
  $('saveMorningBtn').addEventListener('click',saveMorning);
  $('saveEveningBtn').addEventListener('click',saveEvening);
  $('resetMorningBtn').addEventListener('click',resetMorningForm);
  $('resetEveningBtn').addEventListener('click',resetEveningForm);
  $('editMorningBtn').addEventListener('click',editMorning);
  $('editEveningBtn').addEventListener('click',editEvening);
  $('exportBtn').addEventListener('click',exportJson);
  $('clearBtn').addEventListener('click',clearAll);
  document.addEventListener('visibilitychange',()=>{if(!document.hidden)checkNewDay();});
  window.addEventListener('focus',checkNewDay);
  setInterval(checkNewDay,60000);

  const settings=loadSettings();
  mode=settings.mode||((new Date().getHours()>=4&&new Date().getHours()<14)?'morning':'evening');
  setMode(mode);refreshUI();
})();
</script>
</body>
</html
